<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FAF9F6">
    <style>html,body{margin:0;height:100%;background:#FAF9F6}</style>
    <!--
      Gate script: for unauthorized users, renders a transition page that matches
      the puzzle page (same background, same 3x3 dot grid) with "No shortcuts"
      text above the dots. After the text fades out, redirects to /.
      Sets window.__lp_blocked to prevent landing.js from firing its own redirect.
    -->
    <script>
    if(!sessionStorage.getItem('_lp_s')){
      window.__lp_blocked=true;
      document.addEventListener('DOMContentLoaded',function(){
        var b=document.body;
        b.innerHTML='';
        b.style.cssText='margin:0;height:100vh;background:#FAF9F6;overflow:hidden';
        // Keyframes for text fade
        var k=document.createElement('style');
        k.textContent='@keyframes ns{0%{opacity:0}30%{opacity:1}70%{opacity:1}100%{opacity:0}}';
        document.head.appendChild(k);
        // "No shortcuts" text — positioned above center to sit above the dots
        var m=document.createElement('div');
        m.textContent='No shortcuts';
        m.style.cssText="position:absolute;left:0;width:100%;text-align:center;top:calc(50% - 200px);font-family:Georgia,serif;font-size:2.2rem;color:#FFB7C5;opacity:0;animation:ns 2.8s ease forwards";
        b.appendChild(m);
        // 3x3 dot grid matching puzzle layout (100px spacing, 6px radius, #990012)
        // 3x3 dots: 100px center-to-center spacing, 12px diameter, matching PixiJS layout
        var g=document.createElement('div');
        g.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-100px,-100px)';
        for(var r=0;r<3;r++)for(var c=0;c<3;c++){
          var d=document.createElement('div');
          d.style.cssText='position:absolute;width:12px;height:12px;border-radius:50%;background:#990012;left:'+(c*100-6)+'px;top:'+(r*100-6)+'px';
          g.appendChild(d);
        }
        b.appendChild(g);
        m.addEventListener('animationend',function(){location.replace('/')});
      });
    }
    </script>
    <title>Love Pill</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="icon" type="image/png" href="../favicon.png">
  <script type="module" crossorigin src="../assets/modulepreload-polyfill-B5Qt9EMX.js"></script>
  <script type="module" crossorigin src="../assets/landing-BGdb14EN.js"></script>
</head>
<body>
</body>
</html>
