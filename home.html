<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#FAF9F6">
    <style>html,body{margin:0;height:100%;background:#FAF9F6}</style>
    <!-- Gate script — same logic as landing-page/index.html (see comments there). -->
    <script>
    if(!sessionStorage.getItem('_lp_s')){
      window.__lp_blocked=true;
      document.addEventListener('DOMContentLoaded',function(){
        var b=document.body;
        b.innerHTML='';
        b.style.cssText='margin:0;height:100vh;background:#FAF9F6;overflow:hidden';
        var k=document.createElement('style');
        k.textContent='@keyframes ns{0%{opacity:0}30%{opacity:1}70%{opacity:1}100%{opacity:0}}';
        document.head.appendChild(k);
        var m=document.createElement('div');
        m.textContent='No shortcuts';
        m.style.cssText="position:absolute;left:0;width:100%;text-align:center;top:calc(50% - 200px);font-family:Georgia,serif;font-size:2.2rem;color:#FFB7C5;opacity:0;animation:ns 2.8s ease forwards";
        b.appendChild(m);
        var g=document.createElement('div');
        g.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:grid;grid-template-columns:repeat(3,1fr);gap:88px';
        for(var i=0;i<9;i++){
          var d=document.createElement('div');
          d.style.cssText='width:12px;height:12px;border-radius:50%;background:#990012';
          g.appendChild(d);
        }
        b.appendChild(g);
        m.addEventListener('animationend',function(){location.replace('/')});
      });
    }
    </script>
    <title>Love Pill</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="icon" type="image/png" href="./favicon.png">
</head>
<body>
    <script type="module" src="./src/landing.js"></script>
</body>
</html>
